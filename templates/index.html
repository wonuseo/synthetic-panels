<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synthetic Panels</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f6fa; color: #2d3436; line-height: 1.6;
    }

    /* ── Layout ── */
    .app { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
    .header {
      display: flex; align-items: center; gap: 12px;
      padding-bottom: 20px; border-bottom: 1px solid #dfe6e9; margin-bottom: 28px;
    }
    .header h1 { font-size: 1.6rem; font-weight: 700; }
    .header span { font-size: 1.8rem; }

    /* ── Page: Upload ── */
    .upload-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 28px; }
    @media (max-width: 768px) { .upload-grid { grid-template-columns: 1fr; } }

    .card {
      background: #fff; border-radius: 12px; padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 16px; color: #636e72; }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed #b2bec3; border-radius: 12px;
      padding: 48px 20px; text-align: center; color: #636e72;
      cursor: pointer; transition: .2s;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #6c5ce7; color: #6c5ce7; background: #f8f7ff; }
    .drop-zone input { display: none; }
    .drop-zone p { margin-top: 8px; font-size: .9rem; }

    /* ── Preview ── */
    .preview { margin-top: 16px; text-align: center; }
    .preview img { max-width: 100%; max-height: 360px; border-radius: 8px; border: 1px solid #dfe6e9; }
    .preview .pdf-tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: #dfe6e9; padding: 10px 18px; border-radius: 8px; font-weight: 500;
    }

    /* ── Form ── */
    label { display: block; font-size: .85rem; font-weight: 600; color: #636e72; margin-bottom: 4px; margin-top: 14px; }
    input[type="text"], select {
      width: 100%; padding: 10px 12px; border: 1px solid #dfe6e9; border-radius: 8px;
      font-size: .95rem; background: #fafafa; transition: .2s;
    }
    input:focus, select:focus { outline: none; border-color: #6c5ce7; background: #fff; }

    .persona-badge {
      margin-top: 12px; padding: 10px 14px; border-radius: 8px;
      background: #dfe6e920; border: 1px solid #00b89444; font-size: .9rem;
    }
    .persona-badge.ok { color: #00b894; }
    .persona-badge.err { color: #d63031; border-color: #d6303144; background: #d6303108; }

    .persona-list {
      margin-top: 10px; max-height: 200px; overflow-y: auto;
      border: 1px solid #dfe6e9; border-radius: 8px; background: #fafafa;
    }
    .persona-list-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; border-bottom: 1px solid #f0f0f0; font-size: .85rem;
    }
    .persona-list-item:last-child { border-bottom: none; }
    .persona-list-item .p-name { font-weight: 600; flex: 1; }
    .persona-list-item .p-tag {
      font-size: .75rem; padding: 2px 7px; border-radius: 10px;
      background: #e8f5e9; color: #2e7d32;
    }
    .provider-warning {
      margin-top: 8px; padding: 8px 12px; border-radius: 8px;
      background: #fff3e0; border: 1px solid #ffb74d; color: #e65100; font-size: .85rem;
    }

    /* ── Primary button ── */
    .btn-primary {
      width: 100%; margin-top: 22px; padding: 14px; font-size: 1rem; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: #fff;
      transition: .2s; box-shadow: 0 2px 8px rgba(108,92,231,.25);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(108,92,231,.35); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      padding: 10px 20px; font-size: .9rem; font-weight: 600;
      border: 1px solid #6c5ce7; border-radius: 8px; cursor: pointer;
      background: #fff; color: #6c5ce7; transition: .2s;
    }
    .btn-secondary:hover { background: #6c5ce7; color: #fff; }

    /* ── Progress ── */
    .progress-area { margin-top: 20px; }
    .progress-bar-wrap {
      width: 100%; height: 8px; background: #dfe6e9; border-radius: 4px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, #6c5ce7, #a29bfe);
      border-radius: 4px; transition: width .3s;
    }
    .progress-text { font-size: .85rem; color: #636e72; margin-top: 6px; }

    /* ══════  Results page  ══════ */
    .results-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .results-header h2 { font-size: 1.3rem; }

    /* ── Metrics row ── */
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    @media (max-width: 640px) { .metrics { grid-template-columns: repeat(2, 1fr); } }
    .metric-card {
      background: #fff; border-radius: 10px; padding: 16px 18px;
      box-shadow: 0 1px 3px rgba(0,0,0,.05); border-left: 4px solid #6c5ce7;
    }
    .metric-card .label { font-size: .78rem; color: #636e72; text-transform: uppercase; letter-spacing: .4px; }
    .metric-card .value { font-size: 1.6rem; font-weight: 700; color: #2d3436; margin-top: 2px; }

    /* ── Synthesis box ── */
    .synthesis {
      background: linear-gradient(135deg, rgba(108,92,231,.06), rgba(162,155,254,.06));
      border: 1px solid rgba(108,92,231,.18); border-radius: 14px;
      padding: 28px; margin-bottom: 28px;
    }
    .synthesis h3 { font-size: 1.1rem; margin-bottom: 10px; }
    .synthesis .exec-summary { font-size: 1.05rem; line-height: 1.7; margin-bottom: 18px; color: #2d3436; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }
    .syn-list h4 { font-size: .9rem; margin-bottom: 6px; color: #636e72; }
    .syn-list ul { padding-left: 18px; }
    .syn-list li { margin-bottom: 4px; font-size: .92rem; }

    /* ── Chart ── */
    .chart-area { margin: 20px 0; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .bar-row .name { width: 140px; font-size: .85rem; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-row .bar { flex: 1; height: 22px; background: #dfe6e9; border-radius: 4px; overflow: hidden; position: relative; }
    .bar-row .bar-fill {
      height: 100%; border-radius: 4px; transition: width .5s;
      display: flex; align-items: center; justify-content: flex-end; padding-right: 6px;
      font-size: .75rem; font-weight: 600; color: #fff;
    }
    .bar-row .bar-fill.high { background: #00b894; }
    .bar-row .bar-fill.mid  { background: #fdcb6e; }
    .bar-row .bar-fill.low  { background: #d63031; }

    /* ── Scale bars ── */
    .scale-section { margin: 14px 0; }
    .scale-section h5 { font-size: .85rem; margin-bottom: 8px; color: #636e72; }
    .scale-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 640px) { .scale-grid { grid-template-columns: 1fr; } }
    .scale-group { background: #f8f9fa; border-radius: 8px; padding: 14px; }
    .scale-group h6 { font-size: .8rem; color: #636e72; margin-bottom: 8px; font-weight: 600; }
    .scale-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: .85rem; }
    .scale-item .scale-label { width: 80px; text-align: right; color: #636e72; flex-shrink: 0; }
    .scale-item .scale-bar { flex: 1; height: 16px; background: #dfe6e9; border-radius: 3px; overflow: hidden; }
    .scale-item .scale-fill { height: 100%; border-radius: 3px; transition: width .4s; }
    .scale-item .scale-val { width: 32px; font-weight: 600; font-size: .85rem; }
    .scale-fill.ba { background: linear-gradient(90deg, #6c5ce7, #a29bfe); }
    .scale-fill.pi { background: linear-gradient(90deg, #00b894, #55efc4); }
    .scale-fill.pp { background: linear-gradient(90deg, #fdcb6e, #e17055); }

    /* ── Persona cards ── */
    .persona-cards { display: flex; flex-direction: column; gap: 10px; }
    .persona-card {
      background: #fff; border-radius: 10px; overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .persona-card-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; cursor: pointer; user-select: none;
      transition: background .15s;
    }
    .persona-card-header:hover { background: #fafafa; }
    .persona-card-header .emoji { font-size: 1.2rem; }
    .persona-card-header .name { font-weight: 600; flex: 1; }
    .score-badge {
      display: inline-block; padding: 3px 12px; border-radius: 14px;
      font-weight: 700; font-size: .85rem; color: #fff;
    }
    .score-badge.high { background: #00b894; }
    .score-badge.mid  { background: #fdcb6e; color: #2d3436; }
    .score-badge.low  { background: #d63031; }
    .rec-text { font-size: .82rem; color: #636e72; margin-left: 8px; }
    .chevron { font-size: .8rem; color: #b2bec3; transition: transform .2s; }
    .persona-card.open .chevron { transform: rotate(90deg); }

    .persona-card-body { display: none; padding: 0 20px 20px; }
    .persona-card.open .persona-card-body { display: block; }
    .persona-card-body .impression { font-style: italic; color: #636e72; margin-bottom: 12px; }
    .pos-neg { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 12px; }
    .pos-neg h5 { font-size: .85rem; margin-bottom: 4px; }
    .pos-neg ul { padding-left: 16px; font-size: .9rem; }
    .pos-neg li { margin-bottom: 3px; }
    .review-summary { font-size: .92rem; margin-bottom: 10px; }
    .raw-toggle {
      font-size: .8rem; color: #6c5ce7; cursor: pointer; border: none; background: none; padding: 0;
    }
    .raw-content { display: none; margin-top: 8px; background: #f5f6fa; padding: 12px; border-radius: 8px; font-family: monospace; font-size: .8rem; white-space: pre-wrap; max-height: 300px; overflow: auto; }
    .raw-content.show { display: block; }

    /* ── Hidden ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <span>🏨</span>
    <h1>Synthetic Panels</h1>
  </div>

  <!-- ═══════ PAGE: UPLOAD ═══════ -->
  <div id="page-upload">
    <div class="upload-grid">
      <!-- Left: file + text upload -->
      <div class="card">
        <h2>📎 프로모션 자료 업로드</h2>

        <!-- Image/PDF upload -->
        <label style="margin-top:0">이미지 / PDF</label>
        <div class="drop-zone" id="drop-zone">
          <div style="font-size:2.2rem">📄</div>
          <p>PDF, PNG, JPG 파일을 드래그하거나 클릭하여 업로드</p>
          <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg" />
        </div>
        <div class="preview hidden" id="preview"></div>

        <!-- Text input -->
        <label style="margin-top:18px">텍스트 내용</label>
        <textarea id="text-content" rows="6" placeholder="프로모션 텍스트 내용을 입력하세요 (선택사항)" style="width:100%;padding:10px 12px;border:1px solid #dfe6e9;border-radius:8px;font-size:.95rem;background:#fafafa;resize:vertical;font-family:inherit;line-height:1.5;"></textarea>

        <div class="progress-area hidden" id="progress-area">
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
          <div class="progress-text" id="progress-text">준비 중...</div>
        </div>

        <button class="btn-primary" id="btn-run" disabled>🚀 Run Panel Review</button>
      </div>

      <!-- Right: settings -->
      <div class="card">
        <h2>⚙️ Settings</h2>

        <button class="btn-secondary" style="margin-top:4px;width:100%" id="btn-load-personas">페르소나 로드</button>
        <div id="persona-status"></div>
        <div id="persona-list-wrap" class="hidden"></div>

        <label for="provider" style="margin-top:20px">LLM Provider</label>
        <select id="provider">
          <option value="OpenAI" selected>OpenAI</option>
          <option value="Claude" disabled>Claude (미지원)</option>
        </select>
        <div id="provider-warning" class="provider-warning hidden">Claude는 현재 지원되지 않습니다. OpenAI를 선택해 주세요.</div>

        <label for="model">Model</label>
        <select id="model"></select>
      </div>
    </div>
  </div>

  <!-- ═══════ PAGE: RESULTS ═══════ -->
  <div id="page-results" class="hidden">
    <div class="results-header">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="btn-secondary" id="btn-back">← 돌아가기</button>
        <h2>📊 Panel Review Results</h2>
      </div>
      <button class="btn-secondary" id="btn-save">💾 Save to Sheets</button>
    </div>

    <!-- Metrics -->
    <div class="metrics" id="metrics"></div>
    <div class="metrics" id="metrics2" style="margin-top:-10px"></div>

    <!-- Synthesis -->
    <div class="synthesis hidden" id="synthesis"></div>

    <!-- Chart -->
    <div class="card chart-area hidden" id="chart-area">
      <h2>📈 매력도 점수 분포</h2>
      <div id="chart"></div>
    </div>

    <!-- Individual -->
    <div style="margin-top:24px">
      <h2 style="font-size:1.15rem;margin-bottom:14px">🧑‍🤝‍🧑 개별 페르소나 리뷰</h2>
      <div class="persona-cards" id="persona-cards"></div>
    </div>
  </div>
</div>

<script>
/* ── State ── */
const OPENAI_MODELS = ['gpt-4o', 'gpt-4o-mini'];

let selectedFile = null;
let personasLoaded = false;
const $textContent = document.getElementById('text-content');
let lastReviews = [];

/* ── DOM refs ── */
const $dropZone       = document.getElementById('drop-zone');
const $fileInput      = document.getElementById('file-input');
const $preview        = document.getElementById('preview');
const $btnRun         = document.getElementById('btn-run');
const $progress       = document.getElementById('progress-area');
const $progressFill   = document.getElementById('progress-fill');
const $progressText   = document.getElementById('progress-text');
const $btnLoad        = document.getElementById('btn-load-personas');
const $pStatus        = document.getElementById('persona-status');
const $pListWrap      = document.getElementById('persona-list-wrap');
const $provider       = document.getElementById('provider');
const $providerWarn   = document.getElementById('provider-warning');
const $model          = document.getElementById('model');
const $pageUpload     = document.getElementById('page-upload');
const $pageResults    = document.getElementById('page-results');
const $btnBack        = document.getElementById('btn-back');
const $btnSave        = document.getElementById('btn-save');

/* ── Model selector ── */
function updateModels() {
  $model.innerHTML = OPENAI_MODELS.map(m => `<option value="${m}">${m}</option>`).join('');
}
$provider.addEventListener('change', () => {
  if ($provider.value === 'Claude') {
    $providerWarn.classList.remove('hidden');
  } else {
    $providerWarn.classList.add('hidden');
  }
  updateModels();
});
updateModels();

/* ── File upload ── */
$dropZone.addEventListener('click', () => $fileInput.click());
$dropZone.addEventListener('dragover', e => { e.preventDefault(); $dropZone.classList.add('dragover'); });
$dropZone.addEventListener('dragleave', () => $dropZone.classList.remove('dragover'));
$dropZone.addEventListener('drop', e => {
  e.preventDefault(); $dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
$fileInput.addEventListener('change', () => { if ($fileInput.files.length) handleFile($fileInput.files[0]); });

function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['pdf','png','jpg','jpeg'].includes(ext)) { alert('PDF, PNG, JPG만 지원합니다.'); return; }
  selectedFile = file;
  $preview.classList.remove('hidden');
  if (ext === 'pdf') {
    $preview.innerHTML = `<div class="pdf-tag">📄 ${file.name} (${(file.size/1024).toFixed(1)} KB)</div>`;
  } else {
    const url = URL.createObjectURL(file);
    $preview.innerHTML = `<img src="${url}" alt="${file.name}" />`;
  }
  updateRunBtn();
}

function updateRunBtn() {
  const hasContent = selectedFile || $textContent.value.trim();
  $btnRun.disabled = !(hasContent && personasLoaded);
}
$textContent.addEventListener('input', updateRunBtn);

/* ── Load personas ── */
$btnLoad.addEventListener('click', async () => {
  $pStatus.innerHTML = '<div class="persona-badge" style="color:#636e72">로딩 중...</div>';
  $pListWrap.classList.add('hidden');
  $pListWrap.innerHTML = '';
  try {
    const res = await fetch('/api/personas', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      personasLoaded = true;
      $pStatus.innerHTML = `<div class="persona-badge ok">✅ ${data.personas.length}명 로드 완료</div>`;
      $pListWrap.classList.remove('hidden');
      $pListWrap.innerHTML = `<div class="persona-list">${
        data.personas.map(p => `
          <div class="persona-list-item">
            <span class="p-name">${esc(p.persona_name)}</span>
            ${p.panel_gender ? `<span class="p-tag">${esc(p.panel_gender)}</span>` : ''}
            ${p.persona_season ? `<span class="p-tag">${esc(p.persona_season)}</span>` : ''}
          </div>`).join('')
      }</div>`;
    } else {
      personasLoaded = false;
      $pStatus.innerHTML = `<div class="persona-badge err">❌ ${data.error}</div>`;
    }
  } catch (e) {
    personasLoaded = false;
    $pStatus.innerHTML = `<div class="persona-badge err">❌ 네트워크 오류</div>`;
  }
  updateRunBtn();
});

/* ── Run review (SSE) ── */
$btnRun.addEventListener('click', async () => {
  const textVal = $textContent.value.trim();
  if ((!selectedFile && !textVal) || !personasLoaded) return;
  $btnRun.disabled = true;
  $progress.classList.remove('hidden');
  $progressFill.style.width = '0%';
  $progressText.textContent = '리뷰를 시작합니다...';

  const fd = new FormData();
  if (selectedFile) fd.append('file', selectedFile);
  if (textVal) fd.append('text_content', textVal);
  fd.append('provider', $provider.value);
  fd.append('model', $model.value);

  try {
    const res = await fetch('/api/review', { method: 'POST', body: fd });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event:')) {
          eventType = line.slice(6).trim();
        } else if (line.startsWith('data:')) {
          const raw = line.slice(5).trim();
          if (!raw) continue;
          try {
            const payload = JSON.parse(raw);
            if (eventType === 'progress') {
              const pct = (payload.completed / payload.total) * 100;
              $progressFill.style.width = pct + '%';
              $progressText.textContent = `${payload.completed}/${payload.total} 완료 — ${payload.persona_name}`;
            } else if (eventType === 'status') {
              $progressText.textContent = payload.message;
            } else if (eventType === 'done') {
              showResults(payload);
            }
          } catch {}
        }
      }
    }
  } catch (e) {
    alert('리뷰 실행 중 오류: ' + e.message);
  }

  $progress.classList.add('hidden');
  $btnRun.disabled = false;
});

/* ── Navigation ── */
$btnBack.addEventListener('click', () => {
  $pageResults.classList.add('hidden');
  $pageUpload.classList.remove('hidden');
});

/* ── Save ── */
$btnSave.addEventListener('click', async () => {
  if (!lastReviews.length) return;
  $btnSave.disabled = true;
  $btnSave.textContent = '저장 중...';
  const fd = new FormData();
  fd.append('reviews_json', JSON.stringify(lastReviews));
  try {
    const res = await fetch('/api/save', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.ok) {
      $btnSave.textContent = `✅ ${data.count}건 저장 완료`;
      setTimeout(() => { $btnSave.textContent = '💾 Save to Sheets'; $btnSave.disabled = false; }, 3000);
    } else {
      alert('저장 실패: ' + data.error);
      $btnSave.textContent = '💾 Save to Sheets';
      $btnSave.disabled = false;
    }
  } catch (e) {
    alert('저장 중 오류: ' + e.message);
    $btnSave.textContent = '💾 Save to Sheets';
    $btnSave.disabled = false;
  }
});

/* ══════════════════════════════
   Render results page
   ══════════════════════════════ */
function showResults(payload) {
  const { reviews, synthesis, synthesis_raw } = payload;
  lastReviews = reviews;

  $pageUpload.classList.add('hidden');
  $pageResults.classList.remove('hidden');

  const valid = reviews.filter(r => !r.error);
  const validScores = valid.filter(r => r.appeal_score > 0).map(r => r.appeal_score);
  const avg = validScores.length ? (validScores.reduce((a,b) => a+b, 0) / validScores.length).toFixed(1) : '0';
  const interested = reviews.filter(r => r.recommendation && (
    r.recommendation.includes('관심 있음') || (r.recommendation.includes('Interested') && !r.recommendation.includes('Not'))
  )).length;
  const errors = reviews.filter(r => r.error).length;

  // Brand Attitude averages
  const baScores = valid.filter(r => r.like_dislike > 0).map(r =>
    (r.like_dislike + r.positive_negative + r.good_bad + r.favorable_unfavorable) / 4
  );
  const avgBa = baScores.length ? (baScores.reduce((a,b) => a+b, 0) / baScores.length).toFixed(1) : '0';
  // Purchase Intention averages
  const piScores = valid.filter(r => r.likelihood_high > 0).map(r =>
    (r.likelihood_high + r.probability_consider_high + r.willingness_high) / 3
  );
  const avgPi = piScores.length ? (piScores.reduce((a,b) => a+b, 0) / piScores.length).toFixed(1) : '0';
  // Purchase Probability average
  const ppScores = valid.map(r => r.purchase_probability_juster).filter(v => v > 0);
  const avgPp = ppScores.length ? (ppScores.reduce((a,b) => a+b, 0) / ppScores.length).toFixed(1) : '0';

  // Metrics row 1
  document.getElementById('metrics').innerHTML = [
    metricCard('평균 매력도', `${avg} / 10`),
    metricCard('총 패널 수', `${reviews.length}명`),
    metricCard('관심 표명', `${interested}명`),
    metricCard('오류', `${errors}건`),
  ].join('');

  // Metrics row 2
  document.getElementById('metrics2').innerHTML = [
    metricCard('평균 브랜드 태도', `${avgBa} / 7`),
    metricCard('평균 구매 의향', `${avgPi} / 7`),
    metricCard('평균 구매 확률', `${avgPp} / 10`),
    metricCard('유효 응답', `${valid.length}명`),
  ].join('');

  // Synthesis
  const $syn = document.getElementById('synthesis');
  if (synthesis && !synthesis.error) {
    $syn.classList.remove('hidden');
    $syn.innerHTML = renderSynthesis(synthesis);
  } else if (synthesis_raw) {
    $syn.classList.remove('hidden');
    $syn.innerHTML = `<h3>통합 분석 (Raw)</h3><pre style="white-space:pre-wrap;font-size:.85rem">${esc(synthesis_raw)}</pre>`;
  } else {
    $syn.classList.add('hidden');
  }

  // Chart
  const scored = reviews.filter(r => r.appeal_score > 0).sort((a,b) => b.appeal_score - a.appeal_score);
  const $chart = document.getElementById('chart-area');
  if (scored.length) {
    $chart.classList.remove('hidden');
    document.getElementById('chart').innerHTML = scored.map(r => {
      const pct = r.appeal_score * 10;
      const cls = r.appeal_score >= 7 ? 'high' : r.appeal_score >= 4 ? 'mid' : 'low';
      return `<div class="bar-row">
        <div class="name">${esc(r.persona_name)}</div>
        <div class="bar"><div class="bar-fill ${cls}" style="width:${pct}%">${r.appeal_score}</div></div>
      </div>`;
    }).join('');
  } else {
    $chart.classList.add('hidden');
  }

  // Persona cards
  const sorted = [...reviews].sort((a,b) => b.appeal_score - a.appeal_score);
  document.getElementById('persona-cards').innerHTML = sorted.map((r, i) => renderPersonaCard(r, i)).join('');
}

function metricCard(label, value) {
  return `<div class="metric-card"><div class="label">${label}</div><div class="value">${value}</div></div>`;
}

function renderSynthesis(s) {
  let html = '';
  html += `<h3>💡 Executive Summary</h3>`;
  html += `<div class="exec-summary">${esc(s.executive_summary || '')}</div>`;
  html += `<div class="two-col">`;
  html += `<div class="syn-list"><h4>✅ 공통 긍정 요소</h4><ul>${(s.consensus_positives||[]).map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>`;
  html += `<div class="syn-list"><h4>⚠️ 공통 우려 사항</h4><ul>${(s.consensus_concerns||[]).map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>`;
  html += `</div>`;
  if (s.segment_insights && s.segment_insights.length) {
    html += `<div class="syn-list"><h4>📊 세그먼트별 인사이트</h4><ul>${s.segment_insights.map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>`;
  }
  if (s.actionable_recommendations && s.actionable_recommendations.length) {
    html += `<div class="syn-list" style="margin-top:12px"><h4>🎯 실행 제안</h4><ol style="padding-left:18px">${s.actionable_recommendations.map(x => `<li>${esc(x)}</li>`).join('')}</ol></div>`;
  }
  return html;
}

function renderPersonaCard(r, idx) {
  const emoji = recEmoji(r.recommendation);
  const cls = r.appeal_score >= 7 ? 'high' : r.appeal_score >= 4 ? 'mid' : 'low';
  const positives = (r.key_positives || '').split('; ').filter(Boolean);
  const concerns = (r.key_concerns || '').split('; ').filter(Boolean);

  return `<div class="persona-card" id="pc-${idx}">
    <div class="persona-card-header" onclick="toggleCard(${idx})">
      <span class="emoji">${emoji}</span>
      <span class="name">${esc(r.persona_name)}</span>
      <span class="score-badge ${cls}">${r.appeal_score}/10</span>
      <span class="rec-text">${esc(r.recommendation)}</span>
      <span class="chevron">▶</span>
    </div>
    <div class="persona-card-body">
      ${r.error ? `<div style="color:#d63031;margin-bottom:10px">오류: ${esc(r.error)}</div>` : ''}
      <div class="impression">"${esc(r.first_impression)}"</div>
      <div class="pos-neg">
        <div><h5>✅ 긍정 요소</h5><ul>${positives.map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>
        <div><h5>⚠️ 우려 사항</h5><ul>${concerns.map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>
      </div>
      <div class="scale-section">
        <div class="scale-grid">
          <div class="scale-group">
            <h6>📊 브랜드 태도 (1-7)</h6>
            ${scaleBar('호감도', r.like_dislike, 7, 'ba')}
            ${scaleBar('긍/부정', r.positive_negative, 7, 'ba')}
            ${scaleBar('좋음/나쁨', r.good_bad, 7, 'ba')}
            ${scaleBar('호의도', r.favorable_unfavorable, 7, 'ba')}
          </div>
          <div class="scale-group">
            <h6>🛒 구매 의향 (1-7)</h6>
            ${scaleBar('구매 가능성', r.likelihood_high, 7, 'pi')}
            ${scaleBar('고려 확률', r.probability_consider_high, 7, 'pi')}
            ${scaleBar('구매 의향', r.willingness_high, 7, 'pi')}
          </div>
          <div class="scale-group">
            <h6>🎯 구매 확률 (Juster 0-10)</h6>
            ${scaleBar('구매 확률', r.purchase_probability_juster, 10, 'pp')}
          </div>
        </div>
      </div>
      <div class="review-summary"><strong>종합 평가:</strong> ${esc(r.review_summary)}</div>
      <button class="raw-toggle" onclick="toggleRaw(${idx})">Raw Response 보기</button>
      <pre class="raw-content" id="raw-${idx}">${esc(r.raw_response)}</pre>
    </div>
  </div>`;
}

function toggleCard(idx) {
  document.getElementById('pc-' + idx).classList.toggle('open');
}
function toggleRaw(idx) {
  document.getElementById('raw-' + idx).classList.toggle('show');
}

function scaleBar(label, value, max, cls) {
  const pct = max > 0 ? (value / max) * 100 : 0;
  return `<div class="scale-item">
    <span class="scale-label">${label}</span>
    <div class="scale-bar"><div class="scale-fill ${cls}" style="width:${pct}%"></div></div>
    <span class="scale-val">${value}/${max}</span>
  </div>`;
}

function recEmoji(rec) {
  const m = {
    'Strongly Interested':'🟢', 'Somewhat Interested':'🔵', 'Neutral':'🟡', 'Not Interested':'🟠', 'Strongly Not Interested':'🔴',
    '매우 관심 있음':'🟢', '다소 관심 있음':'🔵', '보통':'🟡', '관심 없음':'🟠', '전혀 관심 없음':'🔴'
  };
  return m[rec] || '⚪';
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
