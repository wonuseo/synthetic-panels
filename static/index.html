<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synthetic Panels</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span>🏨</span>
      <h1>Synthetic Panels</h1>
    </div>
    <span class="version-info">v{{ version }} · {{ last_updated }}</span>
  </div>

  <!-- ═══════ PAGE: UPLOAD ═══════ -->
  <div id="page-upload">
    <div class="upload-grid">
      <!-- Left: file + text upload -->
      <div class="card">
        <h2>📎 프로모션 자료 업로드</h2>

        <label style="margin-top:0">이미지 / PDF</label>
        <div class="drop-zone" id="drop-zone">
          <div style="font-size:2.2rem">📄</div>
          <p>PDF, PNG, JPG 파일을 드래그하거나 클릭하여 업로드</p>
          <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg" />
        </div>
        <div class="preview hidden" id="preview"></div>

        <label style="margin-top:18px">텍스트 내용</label>
        <textarea id="text-content" rows="6" placeholder="프로모션 텍스트 내용을 입력하세요 (선택사항)" style="width:100%;padding:10px 12px;border:1px solid #dfe6e9;border-radius:8px;font-size:.95rem;background:#fafafa;resize:vertical;font-family:inherit;line-height:1.5;"></textarea>

        <div class="progress-area hidden" id="progress-area">
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
          <div class="progress-text" id="progress-text">준비 중...</div>
        </div>

        <button class="btn-primary" id="btn-run" disabled>🚀 Run Panel Review</button>
      </div>

      <!-- Right: settings -->
      <div class="card">
        <h2>⚙️ Settings</h2>

        <button class="btn-secondary" style="margin-top:4px;width:100%" id="btn-load-personas">페르소나 로드</button>
        <div id="persona-status"></div>
        <div id="persona-list-wrap" class="hidden"></div>

        <label for="provider" style="margin-top:20px">LLM Provider</label>
        <select id="provider">
          <option value="OpenAI" selected>OpenAI</option>
          <option value="Claude" disabled>Claude (미지원)</option>
        </select>
        <div id="provider-warning" class="provider-warning hidden">Claude는 현재 지원되지 않습니다. OpenAI를 선택해 주세요.</div>

        <label for="model">Model</label>
        <select id="model"></select>

        <label for="qa-mode">QA Mode</label>
        <select id="qa-mode">
          <option value="off">Off — QA 비활성화</option>
          <option value="lite" selected>Lite — 기본 QA (기본값)</option>
          <option value="full">Full — 전체 QA</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ═══════ PAGE: RESULTS ═══════ -->
  <div id="page-results" class="hidden">
    <div class="results-header">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="btn-secondary" id="btn-back">← 돌아가기</button>
        <h2>📊 Panel Review Results</h2>
      </div>
      <button class="btn-secondary" id="btn-save">💾 Save to Sheets</button>
    </div>

    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-tab="overview">개요</button>
      <button class="tab-btn" data-tab="upper">브랜드 자산</button>
      <button class="tab-btn" data-tab="mid">수요 창출</button>
      <button class="tab-btn" data-tab="lower">전환·매출</button>
      <button class="tab-btn" data-tab="individual">개별 리뷰</button>
      <button class="tab-btn" data-tab="qa">품질 검증</button>
    </div>

    <div class="tab-panel active" id="tab-overview"></div>
    <div class="tab-panel" id="tab-upper"></div>
    <div class="tab-panel" id="tab-mid"></div>
    <div class="tab-panel" id="tab-lower"></div>
    <div class="tab-panel" id="tab-individual"></div>
    <div class="tab-panel" id="tab-qa"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
