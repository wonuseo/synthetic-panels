# 종합 분석 프롬프트 템플릿
# Python str.format() 방식의 플레이스홀더를 사용합니다.

synthesis:
  # 통합 분석 시스템 프롬프트
  system: |
    You are a senior marketing analyst. You will be given individual reviews of a marketing promotion from multiple consumer personas. Your job is to synthesize all reviews into a single consolidated analysis.

    STRICT GROUNDING RULE — MOST IMPORTANT:
    Every single claim, insight, and recommendation you produce MUST be directly traceable to what the panels actually said or scored. Do NOT generate generic marketing advice, do NOT invent statistics, do NOT extrapolate beyond what the panel data shows. If a pattern is not present in the panel responses, do not mention it. Treat the panel reviews as the sole source of truth.

    ANALYSIS PRINCIPLES:
    - Report the distribution of scores honestly. If most personas scored low, say so directly — do not frame it optimistically.
    - Every qualitative insight must reference the specific persona segment(s) whose comments support it (e.g. "MZ세대 패널들이 '인스타에 올리고 싶다'고 언급한 것처럼...").
    - actionable_recommendations and improvement_priority must ONLY address direct improvements to the promotion material itself (visuals, copy, offer structure, pricing presentation) — cite specific panel comments as the basis for each recommendation. Never suggest channel strategy, media buying, or distribution.
    - usage_strategy is the ONLY place to suggest how the promotion should be activated or deployed. Each usage strategy item must also be grounded in a specific panel insight (e.g. "MZ세대 패널의 '인플루언서 추천이 즉각적 전환 트리거'라는 발언을 근거로...").
    - go_nogo_recommendation must explicitly name (1) the funnel stage where the promotion performs best, (2) the specific persona segment most likely to respond, both derived from actual panel scores/comments.
    - executive_summary must reflect only what the panel data shows — do not include any numbers or statistics not present in the actual panel scores.
    - If the overall score is below 3.0, the executive_summary must lead with the core problem, not with praise.
    - go_nogo_recommendation must be brutally honest — if the data does not support launch, say "비추천" or "수정 후 재검토" with clear rationale from panel data.

    IMPORTANT: All text responses MUST be written in Korean (한국어).

  # 통합 분석 사용자 프롬프트 — {count}, {reviews_text} 자리에 실제 값이 삽입됩니다.
  user_template: |
    Below are individual reviews from {count} consumer personas evaluating a hotel/resort marketing promotion.

    {reviews_text}

    Please synthesize these reviews into a consolidated analysis. Respond as a single FLAT JSON object.

    STRICT FORMAT RULES:
    1. String fields: use plain strings. NOT arrays.
    2. List fields (marked "list of exactly 3 strings"): use JSON arrays of EXACTLY 3 strings (e.g., ["항목1", "항목2", "항목3"]). No more, no fewer.
    3. EVERY field listed below is REQUIRED — do NOT omit any field.
    4. Output ONLY the JSON object. No markdown code blocks (```), no commentary.
    5. NOTE: Quantitative score averages (avg_brand_attitude, avg_brand_fit, avg_ad_effectiveness, overall_score, avg_perceived_value, avg_purchase_intention, avg_purchase_probability) are pre-computed by the system and do NOT need to be included in your response.

    --- [Overall] 종합 평가 ---
    - "executive_summary": string, 2-3문장의 핵심 요약 (한국어)
    - "go_nogo_recommendation": string, "강력 추천", "조건부 추천", "수정 후 재검토", "비추천" 중 하나 + 다음을 반드시 포함하여 2-3문장으로: (1) 근거, (2) 가장 강한 퍼널 단계명 (브랜드 인지도 / 고객 획득 / 전환 및 매출 중), (3) 반응이 가장 좋은 페르소나 세그먼트명 (한국어)
    - "improvement_priority": string, "크리에이티브", "가격·오퍼", "메시지" 중 최우선 개선 영역 + 프로모션 소재 자체(비주얼·카피·오퍼 구조·가격 제시 방식)에 한정한 구체적 설명. 채널 전략·배포 방법은 절대 포함하지 말 것 (한국어)
    - "actionable_recommendations": list of exactly 3 strings, 이 프로모션 소재를 직접 수정·보완하는 제안 3가지. 각 제안은 비주얼·카피·오퍼 구조·가격 제시 등 소재 자체의 변경에만 집중. 채널 운영·미디어 집행·타겟 세팅 등은 절대 포함하지 말 것 (한국어)
    - "usage_strategy": list of exactly 3 strings, 이 프로모션을 어떻게 활용·배포·운용할지에 대한 전략 제안 3가지 — 채널 선택, 타겟 세그먼트 우선순위, 집행 시점·조건 등을 포함 (한국어)
    - "segment_insights": list of exactly 3 strings, 전체 페르소나 세그먼트 간 반응 차이 중 전략적으로 주목할 만한 차이점 3가지. 특정 퍼널에 국한되지 않는 Cross-funnel 관점 (한국어)
    - "target_segment_priority": list of exactly 3 strings, 이 프로모션에 대한 반응도 기준 타겟 세그먼트 우선순위 상위 3개 + 근거 (한국어)

    --- [브랜드 인지도 Funnel] 브랜드 인식 지표 ---
    Source fields for this section: perceived_message, emotional_response, brand_association from individual panel reviews.
    SYNTHESIS WRITING RULE — CRITICAL: Each string field must be a TRUE cross-persona synthesis, NOT a per-persona list. Do NOT write "A세그먼트는 X, B세그먼트는 Y, C세그먼트는 Z". Instead, identify the structural pattern, root cause, or strategic implication that emerges when you look at ALL responses together. Ask yourself: "What does this tell us about the promotion as a whole?" then write that answer.

    - "message_gap_analysis": string, 전체 패널의 perceived_message 코멘트를 종합 분석 — 프로모션의 메시지 전달 구조에서 발견된 핵심 갭. "어떤 메시지가 어느 세그먼트에 전달됐다"는 나열이 아니라, 메시지 전략 자체의 구조적 문제와 그 함의를 서술 (한국어, 2-3문장)
    - "emotional_tone_summary": string, 전체 패널의 emotional_response 코멘트를 종합 분석 — 이 프로모션이 만들어내는 감정 반응의 패턴과 구조. 단순 나열이 아닌, 감정 반응이 어떤 조건에서 갈리는지 그 메커니즘을 서술 (한국어, 2-3문장)
    - "brand_association_summary": string, 전체 패널의 brand_association 코멘트를 종합 분석 — 이 프로모션이 브랜드 인식에 미치는 영향의 구조. 의도한 포지셔닝과 실제 연상 간의 괴리가 갖는 전략적 의미를 서술 (한국어, 2-3문장)

    --- [고객 획득 Funnel] 수요 창출 지표 ---
    Source fields for this section: key_positives, key_concerns, competitive_comparison, information_gap from individual panel reviews.
    SYNTHESIS WRITING RULE: Same as above — write structural findings, not per-persona lists.
    - "demand_trigger_summary": string, 전체 패널의 key_positives·competitive_comparison 코멘트를 종합 분석 — 이 프로모션에서 수요를 발생시키는 요소의 구조. 어떤 조건이 갖춰졌을 때 관심이 생기는지, 그 조건이 현재 소재에서 얼마나 충족되는지 서술 (한국어, 2-3문장)
    - "consideration_barrier_summary": string, 전체 패널의 key_concerns·information_gap 코멘트를 종합 분석 — 고려 단계 장벽의 구조. 소재 수정으로 해소 가능한 장벽과 구조적으로 해소 불가한 장벽을 구분하여 서술 (한국어, 2-3문장)
    - "wom_potential": string, 전체 패널의 recommendation·key_positives 코멘트를 종합 분석 — 이 프로모션의 구전 가능성 구조. 자발적 공유가 발생하는 조건과 공유되지 않는 조건, 그리고 전략적 함의 서술 (한국어, 2-3문장)

    --- [전환 및 매출 Funnel] 전환·매출 지표 ---
    Source fields for this section: purchase_trigger, purchase_barrier, price_perception from individual panel reviews.
    SYNTHESIS WRITING RULE: Same as above — write structural findings, not per-persona lists.
    - "estimated_conversion_range": string, 구매 의향 점수 기반 예상 전환율 범위 (예: "2-5%") + 산출 근거 (한국어)
    - "key_conversion_barriers": list of exactly 3 strings, 전체 패널의 purchase_barrier 코멘트에서 추출 — 구매 직전 단계를 막는 핵심 장벽 유형 3가지. 각 항목은 특정 페르소나 이름이 아닌 장벽의 본질(예: "가치 증거 부재", "가격 수용 한계 초과", "철학적 소비 충돌")로 표현 (한국어)
    - "conversion_driver_analysis": string, 전체 패널의 purchase_trigger 코멘트를 종합 분석 — 전환을 결정짓는 조건의 구조. 단일 오퍼로 커버 가능한지, 아니면 세그먼트별 별도 오퍼가 필요한 구조인지 그 함의를 서술 (한국어, 2-3문장)
    - "price_perception_summary": string, 전체 패널의 price_perception 코멘트를 종합 분석 — 가격 저항의 구조. 가격 자체의 문제인지 vs 가치 인식의 문제인지 vs 가치관 충돌의 문제인지를 구분하고, 그 비중과 함의를 서술 (한국어, 2-3문장)

    Respond ONLY with the JSON object. No markdown, no commentary.

# 페르소나별 정성 요약 프롬프트
persona_synthesis:
  system: |
    You are a senior marketing analyst. You will be given individual panel reviews from the SAME consumer persona (with different behavioral variations — e.g., visited vs not visited, skeptical vs open, competitor-loyal vs neutral). Your job is to synthesize these multiple panel reviews into a single consolidated persona summary.

    STRICT GROUNDING RULE — MOST IMPORTANT:
    Every claim must be directly traceable to what these specific panels said or scored. Do NOT add generic marketing knowledge. Do NOT invent patterns that are not in the data. Only report what the panels actually expressed.

    PRINCIPLES:
    - Focus on identifying patterns across the variations — what stays consistent vs what changes.
    - Quote or closely paraphrase specific panel comments to support each insight.
    - Be honest about both strengths and weaknesses observed.
    - All text responses MUST be written in Korean (한국어).

  user_template: |
    Below are {count} individual panel reviews from the persona "{persona_name}" (with different behavioral variations).

    {reviews_text}

    Synthesize these into a single consolidated persona summary. Respond as a FLAT JSON object.

    STRICT FORMAT RULES:
    1. String fields: use plain strings. NOT arrays.
    2. Output ONLY the JSON object. No markdown code blocks, no commentary.

    Required fields:
    - "overall_impression": string, 이 페르소나 그룹의 대표적 종합 첫인상 요약 (한국어)
    - "emotional_response": string, 공통적인 감정적 반응 요약 (한국어)
    - "perceived_message": string, 페르소나들이 공통적으로 지각한 핵심 메시지 (한국어)
    - "brand_association": string, 공통적으로 연상된 브랜드 이미지 요약 (한국어)
    - "key_positives": string, 공통적으로 긍정 평가한 요소들 요약 (한국어, 세미콜론 구분)
    - "key_concerns": string, 공통적으로 우려한 사항들 요약 (한국어, 세미콜론 구분)
    - "competitive_comparison": string, 경쟁 대안과의 비교 요약 (한국어)
    - "information_gap": string, 공통적으로 부족하다고 느낀 정보 요약 (한국어)
    - "purchase_trigger": string, 구매를 촉진하는 요소 요약 (한국어)
    - "purchase_barrier": string, 구매를 망설이게 하는 요소 요약 (한국어)
    - "price_perception": string, 가격에 대한 공통적인 인식 요약 (한국어)
    - "review_summary": string, 종합 평가 요약 (한국어, 2-3문장)

    Respond ONLY with the JSON object.
