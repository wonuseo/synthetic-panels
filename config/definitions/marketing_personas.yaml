# 페르소나 필드 정의 — Google Sheets 컬럼명과 일치해야 합니다.
fields:
  - key: persona_id
    label: "ID"
  - key: persona_name
    label: "이름"
  - key: panel_gender
    label: "성별"
  - key: panel_age
    label: "나이"
  - key: persona_season
    label: "선호 시즌"
  - key: panel_cpc
    label: "CPC (예산 등급)"
  - key: panel_potential
    label: "잠재 가치"
  - key: panel_room_pref
    label: "선호 객실 타입"
  - key: panel_bed_pref
    label: "선호 침대 타입"
  - key: panel_activity_pref_1
    label: "선호 활동 1"
  - key: panel_activity_pref_2
    label: "선호 활동 2"
  - key: panel_activity_pref_3
    label: "선호 활동 3"
  - key: panel_cuisine_1
    label: "선호 음식 1"
  - key: panel_cuisine_2
    label: "선호 음식 2"
  - key: persona_ksf
    label: "핵심 성공 요인 (KSF)"
  - key: panel_visited
    label: "방문 유무"
  - key: panel_visit_experience
    label: "방문 경험"
  - key: panel_skepticism
    label: "마케팅 회의도"
  - key: panel_competitor_pref
    label: "선호 경쟁 브랜드"
  - key: panel_past_friction
    label: "과거 마찰/불만 경험"

# LLM에 전달되는 페르소나 프로필 텍스트 템플릿
# Python str.format(**fields) 방식으로 렌더링됩니다.
profile_template: |
  이름: {persona_name}
  성별: {panel_gender}
  나이: {panel_age}
  선호 시즌: {persona_season}
  예산 등급(CPC): {panel_cpc}
  잠재 가치: {panel_potential}
  선호 객실: {panel_room_pref}
  선호 침대: {panel_bed_pref}
  선호 활동: {panel_activity_pref_1}, {panel_activity_pref_2}, {panel_activity_pref_3}
  선호 음식: {panel_cuisine_1}, {panel_cuisine_2}
  핵심 성공 요인(KSF): {persona_ksf}
  방문 유무: {panel_visited}
  방문 경험: {panel_visit_experience}
  마케팅 회의도: {panel_skepticism}
  선호 경쟁 브랜드: {panel_competitor_pref}
  과거 마찰/불만: {panel_past_friction}
