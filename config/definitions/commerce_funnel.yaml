overall:
  label: "Overall (상품 종합)"
  desc_who: "전체 평가 대상"
  desc_goal: "MD 상품의 전반적인 매력도와 퀄리티를 종합 평가"
  desc_metrics: "상품 매력도, 상품 퀄리티"
  individual_items:
    quantitative:
      - { key: product_appeal, label: "상품 매력도", scale: "1-5" }
      - { key: product_quality, label: "상품 퀄리티", scale: "1-5" }
    qualitative:
      - { key: overall_impression, label: "종합 첫인상" }
      - { key: review_summary, label: "종합 평가" }
  synthesis_items:
    qualitative:
      - { key: executive_summary, label: "핵심 요약" }
      - { key: go_nogo_recommendation, label: "Go/No-Go 의사결정" }
      - { key: improvement_priority, label: "최우선 개선 영역" }
      - { key: actionable_recommendations, label: "상품 개선 제안" }
      - { key: usage_strategy, label: "활용 방안 제안" }
      - { key: segment_insights, label: "세그먼트 인사이트" }
      - { key: target_segment_priority, label: "타겟 세그먼트 우선순위" }

funnels:
  upper:
    label: "브랜드 인지도"
    desc_who: "잠재 소비자"
    desc_goal: "상품의 차별성·브랜드 프리미엄·신뢰도·비주얼·스토리 매력을 인지하는 단계"
    desc_metrics: "차별성, 브랜드 프리미엄, 신뢰도, 비주얼 매력, 스토리 매력"
    individual_items:
      quantitative:
        - { key: product_uniqueness, label: "상품 차별성", scale: "1-5" }
        - { key: brand_premium, label: "브랜드 프리미엄", scale: "1-5" }
        - { key: product_trust, label: "상품 신뢰도", scale: "1-5" }
        - { key: visual_appeal, label: "비주얼 매력도", scale: "1-5" }
        - { key: story_appeal, label: "스토리 매력도", scale: "1-5" }
      qualitative:
        - { key: product_impression, label: "상품 첫인상" }
        - { key: emotional_response, label: "감정적 반응" }
        - { key: brand_association, label: "브랜드 연상" }
    synthesis_items:
      quantitative:
        - { key: avg_product_appeal, label: "평균 상품 매력도" }
        - { key: avg_brand_presence, label: "평균 브랜드 존재감" }
        - { key: avg_product_presentation, label: "평균 상품 표현력" }
      qualitative:
        - { key: product_message_analysis, label: "상품 메시지 분석" }
        - { key: emotional_appeal_summary, label: "감성 소구 요약" }
        - { key: brand_premium_summary, label: "브랜드 프리미엄 종합" }
    qa_items:
      - { key: qa_rep_brand_attitude, type: replication }
      - { key: qa_trap_skepticism_check, type: trap }
    quant_groups:
      - { label: "상품 매력도", keys: ["product_uniqueness", "brand_premium", "product_trust"], sublabels: ["상품 차별성", "브랜드 프리미엄", "상품 신뢰도"] }
      - { label: "비주얼·스토리", keys: ["visual_appeal", "story_appeal"], sublabels: ["비주얼 매력도", "스토리 매력도"] }

  mid:
    label: "고객 획득"
    desc_who: "관심을 보인 잠재·신규 고객"
    desc_goal: "상품의 가격 대비 가치·품질 기대감·선물 적합성을 인식하는 단계"
    desc_metrics: "가격 대비 가치, 품질 기대감, 선물 적합성, 정보 충분성, 추천 의향"
    individual_items:
      quantitative:
        - { key: price_value, label: "가격 대비 가치", scale: "1-5" }
        - { key: quality_expectation, label: "품질 기대감", scale: "1-5" }
        - { key: gift_suitability, label: "선물 적합성", scale: "1-5" }
        - { key: info_sufficiency, label: "정보 충분성", scale: "1-5" }
        - { key: recommendation_intent, label: "추천 의향", scale: "1-5" }
      qualitative:
        - { key: key_positives, label: "긍정 요소" }
        - { key: key_concerns, label: "우려 사항" }
        - { key: competitive_comparison, label: "경쟁 상품 비교" }
        - { key: information_gap, label: "정보 부족 사항" }
      categorical:
        - { key: recommendation, label: "관심도", options: ["매우 관심 있음", "다소 관심 있음", "보통", "관심 없음", "전혀 관심 없음"] }
    synthesis_items:
      quantitative:
        - { key: overall_score, label: "종합 매력도" }
        - { key: avg_perceived_value, label: "평균 지각된 가치" }
      qualitative:
        - { key: demand_trigger_summary, label: "수요 발생 요인" }
        - { key: consideration_barrier_summary, label: "고려 단계 장벽" }
        - { key: wom_potential, label: "구전 잠재력" }
    qa_items:
      - { key: qa_rep_value_perception, type: replication }
      - { key: qa_trap_budget_sensitivity, type: trap }
      - { key: qa_trap_competitor_loyalty, type: trap }
    quant_groups:
      - { label: "가치 인식", keys: ["price_value", "quality_expectation", "gift_suitability"], sublabels: ["가격 대비 가치", "품질 기대감", "선물 적합성"] }
      - { label: "구전·정보", keys: ["info_sufficiency", "recommendation_intent"], sublabels: ["정보 충분성", "추천 의향"] }

  lower:
    label: "전환 및 매출"
    desc_who: "구매를 고려 중인 고객"
    desc_goal: "최종 구매 전환과 재구매로 이어지는 단계"
    desc_metrics: "구매 가능성, 고려 확률, 구매 의향, 재구매 의향, 구매 시급성"
    individual_items:
      quantitative:
        - { key: purchase_likelihood, label: "구매 가능성", scale: "1-5" }
        - { key: purchase_consideration, label: "고려 확률", scale: "1-5" }
        - { key: purchase_willingness, label: "구매 의향", scale: "1-5" }
        - { key: repurchase_intent, label: "재구매 의향", scale: "1-5" }
        - { key: purchase_urgency, label: "구매 시급성", scale: "1-5" }
      qualitative:
        - { key: purchase_trigger, label: "구매 촉진 요소" }
        - { key: purchase_barrier, label: "구매 장벽" }
        - { key: price_perception, label: "가격 인식" }
    synthesis_items:
      quantitative:
        - { key: avg_purchase_intention, label: "평균 구매 의향" }
        - { key: avg_purchase_probability, label: "평균 구매 확률" }
        - { key: estimated_conversion_range, label: "예상 전환율" }
      qualitative:
        - { key: key_conversion_barriers, label: "핵심 전환 장벽" }
        - { key: conversion_driver_analysis, label: "전환 촉진 요소 분석" }
        - { key: price_perception_summary, label: "가격 인식 종합" }
    qa_items:
      - { key: qa_rep_purchase_intent, type: replication }
    quant_groups:
      - { label: "구매 의향", keys: ["purchase_likelihood", "purchase_consideration", "purchase_willingness"], sublabels: ["구매 가능성", "고려 확률", "구매 의향"] }
      - { label: "재구매·시급성", keys: ["repurchase_intent", "purchase_urgency"], sublabels: ["재구매 의향", "구매 시급성"] }
